<!DOCTYPE html>
<html lang="en">
<style>

    html, body {
        margin: 0; 
        height: 100%; 
    }

    img.logo {
        max-height: 100px;

        width: auto;
    }
    .container {
        display: flex;
        flex-direction: column;

    .button {

        width: 45%;
        min-width: 200px;

        padding: 16px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        transition-duration: 0.4s;
        cursor: pointer;
        }

    .button1 {
        background-color: white; 
        color: black; 
        font-weight: bold;
        border: 5px solid #242424;
        border-radius: 15px;
    }

    .button1:hover {
        background-color: #000000;
        color: white;
    }

    @media only screen and (max-width: 600px) {

        img.logo {
            max-height: 100px;
            max-width: 80%;
        }

        .button {
            width: 80%;
            min-width: 0;
            padding: 12px 16px;
            font-size: 24px;
        }

        .font {
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;

        .font2 {

            text-align: center;
