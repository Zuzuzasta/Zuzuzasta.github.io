<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzuzasta - engineering - photography - design - Zuzanna Stachlewska</title>

    <!-- Quicksand from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<style>
    html,
    body {
        margin: 0;
        height: 100%;
        overflow: visible
    }

    img.logo {
        height: 100px;
        width: auto;
        min-width: 320px;
        display: block;
        flex-shrink: 0;
        margin-top: 20px;
    }

    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;

    }

    .font {
        font-family: "Quicksand", system-ui, sans-serif;
        font-size: 16px;
    }

    .font2 {
        font-family: "Quicksand", system-ui, sans-serif;
        font-weight: bold;
        font-size: 22px;
    }

    .button {
        border: none;
        color: white;
        font-family: "Quicksand", system-ui, sans-serif;
        width: 35vw;
        min-width: 275px;
        padding: 16px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        transition-duration: 0.4s;
        cursor: pointer;
    }

    .button1 {
        background-color: white;
        color: black;
        font-weight: bold;
        border: 5px solid #191919;
        border-radius: 15px;
    }

    .button1:hover {
        background-color: #242424;
        color: white;
    }

    .text-columns {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: baseline;
        width: 80vw;
        column-gap: 4rem;
    }

    img.button-back {
        height: 36px;
        width: auto;
        min-width: 75px;
        display: block;
        flex-shrink: 0;
    }

    .button-back-container {

        justify-content: left;
        min-width: 80%;
        margin-bottom: 5%;
        margin-top: 3%;
    }

    @media only screen and (max-width: 600px) {

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        img.logo {
            max-height: 100px;
            max-width: 80%;
            margin-top: 20px;
        }

        .button {
            width: 80vw;
            min-width: 0;
            padding: 12px 16px;
            font-size: 24px;
        }

        .font {
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
        }

        .font2 {
            font-size: 20px;
            text-align: center;
            margin-bottom: 12px;
            font-weight: bold;
        }

        img.button-back {
            height: 18px;
            width: auto;
            min-width: 37px;
            visibility: hidden;

        }

        .button-back-container {
            display: none;
        }

    }
</style>

<body>
    <div class="container">

        <div class="button-back-container">
            <img class="button-back" src="../arrow-small-left.png" alt="back button"
                onclick="window.location='../index.html';">
        </div>

        <img class="logo" src="../Zuzuzasta-Logo_2.png" alt="Zuzuzasta logotype"
            onclick="window.location='https://zuzuzasta.github.io/';">

        <p class="font"> engineering - photography - design </p>

        <h1 class="font2"> You can contact me via: </h1>

        <button class="button button1" onclick="window.location='https://www.linkedin.com/in/zuzanna-stachlewska';">
            LinkedIn
        </button>

        <button class="button button1" onclick="window.location='https://www.instagram.com/by.zuzuzasta/';">
            Instagram
        </button>

    </div>

</body>

</html>
